<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyse Plan de Formation — Éminéo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --abysse:#0B2B2D;
  --petrole:#134547;
  --menthe:#5DE298;
  --givre:#E3FFF0;
  --saumon:#E89B77;
  --blanc:#FFFFFF;
  --gris50:#F5F5F3;
  --gris100:#E8E7E3;
  --gris300:#C4C3BD;
  --gris500:#8A8982;
  --gris700:#4A4A46;
  --rouge:#C84B4B;
  --rouge50:#FDF0F0;
  --amber:#D97706;
  --amber50:#FFFBEB;
  --bleu:#2563EB;
  --bleu50:#EFF6FF;
  --vert:#16A34A;
  --vert50:#F0FDF4;
}
body{font-family:'Inter',sans-serif;background:var(--gris50);color:var(--abysse);line-height:1.5}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;background:none}
textarea{font-family:'Inter',sans-serif}
input[type=file]{font-family:'Inter',sans-serif}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fu{animation:fadeUp 0.3s ease forwards}

/* ── TOPBAR ── */
.topbar{
  background:var(--abysse);height:56px;
  display:flex;align-items:center;gap:1rem;padding:0 2rem;
  position:sticky;top:0;z-index:100;
}
.topbar-logo{
  font-family:'Playfair Display',serif;font-size:17px;
  color:var(--blanc);font-weight:400;letter-spacing:-0.01em;
}
.topbar-badge{
  font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.1em;
  text-transform:uppercase;border:1px solid rgba(255,255,255,.12);
  border-radius:4px;padding:2px 8px;
}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}

/* ── LOGIN ── */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--abysse);
}
.login-card{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:16px;padding:2.5rem;width:380px;
}
.field-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem;display:block}
.field-input{
  width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:.65rem .85rem;font-size:14px;color:#fff;outline:none;
  transition:border-color .15s;margin-bottom:1rem;
}
.field-input:focus{border-color:var(--menthe)}
.btn-primary{
  width:100%;background:var(--petrole);color:#fff;border-radius:8px;
  padding:.75rem;font-size:14px;font-weight:500;transition:background .15s;
}
.btn-primary:hover{background:var(--menthe);color:var(--abysse)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

/* ── LAYOUT PRINCIPAL ── */
.main-wrap{max-width:1080px;margin:0 auto;padding:2rem 1.5rem}
.page-title{
  font-family:'Playfair Display',serif;font-size:26px;font-weight:400;
  color:var(--abysse);margin-bottom:.25rem;
}
.page-sub{font-size:13px;color:var(--gris500);margin-bottom:2rem}

/* ── UPLOAD ZONE ── */
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.upload-card{
  background:#fff;border:1.5px dashed var(--gris300);border-radius:12px;
  padding:1.25rem;transition:all .2s;cursor:pointer;
}
.upload-card:hover,.upload-card.has-file{border-color:var(--menthe);background:var(--givre)}
.upload-card.has-file{border-style:solid}
.upload-icon{font-size:22px;margin-bottom:.5rem}
.upload-title{font-size:13px;font-weight:600;color:var(--abysse);margin-bottom:.2rem}
.upload-hint{font-size:11px;color:var(--gris500)}
.upload-filename{font-size:12px;color:var(--petrole);font-weight:500;margin-top:.4rem;word-break:break-all}
input[type=file]{display:none}

.fields-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.field-wrap{display:flex;flex-direction:column;gap:.3rem}
.field-label-dark{font-size:11px;font-weight:600;color:var(--gris700);letter-spacing:.07em;text-transform:uppercase}
.field-input-light{
  background:#fff;border:1px solid var(--gris100);border-radius:8px;
  padding:.6rem .85rem;font-size:13px;color:var(--abysse);outline:none;
  transition:border-color .15s;font-family:'Inter',sans-serif;
}
.field-input-light:focus{border-color:var(--petrole)}

.btn-analyse{
  background:var(--abysse);color:#fff;border-radius:10px;
  padding:.85rem 2rem;font-size:14px;font-weight:500;
  display:inline-flex;align-items:center;gap:.6rem;transition:background .15s;
}
.btn-analyse:hover{background:var(--petrole)}
.btn-analyse:disabled{opacity:.4;cursor:not-allowed}

/* ── KPI STRIP ── */
.kpi-strip{
  display:grid;grid-template-columns:repeat(5,1fr);gap:.75rem;
  margin-bottom:1.75rem;
}
.kpi-card{
  background:#fff;border-radius:10px;border:1px solid var(--gris100);
  padding:.9rem;text-align:center;
}
.kpi-num{font-size:26px;font-weight:600;line-height:1;margin-bottom:.2rem}
.kpi-label{font-size:11px;color:var(--gris500);font-weight:500}

/* ── BLOC ACCORDION ── */
.bloc-card{
  background:#fff;border-radius:12px;border:1px solid var(--gris100);
  margin-bottom:.75rem;overflow:hidden;
}
.bloc-header{
  display:flex;align-items:center;gap:.75rem;padding:1rem 1.25rem;
  cursor:pointer;transition:background .15s;user-select:none;
}
.bloc-header:hover{background:var(--gris50)}
.bloc-chevron{font-size:12px;color:var(--gris500);transition:transform .2s;flex-shrink:0}
.bloc-chevron.open{transform:rotate(90deg)}
.bloc-id{
  font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  background:var(--abysse);color:#fff;border-radius:5px;padding:2px 8px;flex-shrink:0;
}
.bloc-titre{font-size:14px;font-weight:500;color:var(--abysse);flex:1}
.bloc-score{font-size:18px;font-weight:600;flex-shrink:0}
.bloc-body{padding:0 1.25rem 1.25rem}

/* ── COMPETENCE ROW ── */
.comp-row{
  border-radius:8px;border:1px solid var(--gris100);
  margin-bottom:.5rem;overflow:hidden;
}
.comp-header{
  display:flex;align-items:center;gap:.6rem;padding:.75rem .9rem;
  cursor:pointer;transition:background .15s;
}
.comp-header:hover{background:var(--gris50)}
.comp-id{font-size:11px;font-weight:600;color:var(--gris500)}
.comp-libelle{font-size:13px;color:var(--abysse);flex:1}
.comp-score{font-size:13px;font-weight:600;flex-shrink:0}
.comp-body{padding:.75rem .9rem;background:var(--gris50);border-top:1px solid var(--gris100)}

/* ── SIGNAL CARD ── */
.signal-card{
  background:#fff;border-radius:8px;border:1px solid var(--gris100);
  padding:.75rem .9rem;margin-bottom:.5rem;
}
.signal-card.archive{opacity:.5}
.signal-top{display:flex;align-items:flex-start;gap:.6rem;margin-bottom:.5rem}
.signal-badge{
  font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  border-radius:20px;padding:2px 9px;flex-shrink:0;margin-top:1px;
}
.signal-message{font-size:12px;color:var(--gris700);flex:1;line-height:1.6}
.signal-actions{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem}
.btn-sm{
  font-size:11px;border-radius:6px;padding:3px 10px;border:1px solid var(--gris100);
  color:var(--gris700);transition:all .15s;background:#fff;
}
.btn-sm:hover{border-color:var(--petrole);color:var(--abysse)}
.btn-sm.active{background:var(--petrole);color:#fff;border-color:var(--petrole)}
.btn-sm.danger{border-color:var(--rouge);color:var(--rouge)}
.btn-sm.danger:hover{background:var(--rouge);color:#fff}
.gravite-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;
}

/* ── DIALOGUE ── */
.dialogue-wrap{
  margin-top:.6rem;background:var(--bleu50);border-radius:8px;
  border:1px solid #BFDBFE;padding:.75rem;
}
.dialogue-log{margin-bottom:.5rem;max-height:180px;overflow-y:auto}
.msg-row{display:flex;gap:.4rem;margin-bottom:.35rem;font-size:12px;line-height:1.6}
.msg-role{font-weight:600;flex-shrink:0;color:var(--petrole)}
.msg-text{color:var(--abysse)}
.dialogue-input-row{display:flex;gap:.4rem}
.dialogue-input{
  flex:1;background:#fff;border:1px solid #BFDBFE;border-radius:6px;
  padding:.45rem .65rem;font-size:12px;color:var(--abysse);outline:none;resize:none;
}
.dialogue-input:focus{border-color:var(--bleu)}
.btn-send{
  background:var(--petrole);color:#fff;border-radius:6px;
  padding:.45rem .85rem;font-size:12px;font-weight:500;transition:background .15s;flex-shrink:0;
}
.btn-send:hover{background:var(--abysse)}
.btn-send:disabled{opacity:.4;cursor:not-allowed}

/* ── AMELIORATION RETENUE ── */
.amelio-box{
  background:var(--vert50);border:1px solid #BBF7D0;border-radius:6px;
  padding:.5rem .75rem;margin-top:.4rem;font-size:12px;color:var(--vert);
}
.archive-note{
  background:var(--gris50);border-radius:6px;padding:.4rem .65rem;
  font-size:11px;color:var(--gris500);margin-top:.35rem;font-style:italic;
}

/* ── MODULES TAGS ── */
.modules-list{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem}
.module-tag{
  font-size:11px;background:var(--givre);color:var(--petrole);
  border-radius:20px;padding:2px 9px;border:1px solid #A7F3C8;
}

/* ── EXPORT BAR ── */
.export-bar{
  background:#fff;border-top:1px solid var(--gris100);
  padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1rem;
  position:sticky;bottom:0;z-index:50;
}
.export-info{font-size:12px;color:var(--gris500);flex:1}

/* ── SPINNER ── */
.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,.25);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
}

/* ── STATUT COLORS ── */
.st-point_fort .signal-badge{background:var(--vert50);color:var(--vert)}
.st-point_fort .signal-card{border-left:3px solid var(--vert)}
.st-a_peaufiner .signal-badge{background:var(--bleu50);color:var(--bleu)}
.st-a_peaufiner .signal-card{border-left:3px solid var(--bleu)}
.st-redondance .signal-badge{background:var(--amber50);color:var(--amber)}
.st-redondance .signal-card{border-left:3px solid var(--amber)}
.st-lacune .signal-badge{background:var(--amber50);color:var(--amber)}
.st-lacune .signal-card{border-left:3px solid var(--amber)}
.st-manquement .signal-badge{background:var(--rouge50);color:var(--rouge)}
.st-manquement .signal-card{border-left:3px solid var(--rouge)}

.comp-pill-pf{border-radius:20px;font-size:10px;font-weight:600;padding:2px 8px}
.pill-point_fort{background:var(--vert50);color:var(--vert)}
.pill-a_peaufiner{background:var(--bleu50);color:var(--bleu)}
.pill-redondance{background:var(--amber50);color:var(--amber)}
.pill-lacune{background:var(--amber50);color:var(--amber)}
.pill-manquement{background:var(--rouge50);color:var(--rouge)}

.score-bar{background:var(--gris100);border-radius:99px;height:4px;overflow:hidden;margin-top:.3rem}
.score-fill{height:100%;border-radius:99px;transition:width .6s ease}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--gris100);border-radius:3px}
</style>
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;
var useCallback = React.useCallback;

/* ══ CONSTANTES ═════════════════════════════════════════════════ */
var TOKEN_KEY = 'atlas_token';
var API_BASE = '';

var STATUT_LABELS = {
  point_fort:  'Point fort',
  a_peaufiner: 'À peaufiner',
  redondance:  'Redondance',
  lacune:      'Lacune',
  manquement:  'Manquement',
};

var GRAVITE_LABELS = {
  1: 'Informatif',
  2: 'À traiter',
  3: 'Bloquant',
};

var GRAVITE_COLORS = {
  1: '#A7F3C8',
  2: '#FCD34D',
  3: '#FCA5A5',
};

/* ══ HELPERS ════════════════════════════════════════════════════ */
function getToken() {
  try { return localStorage.getItem(TOKEN_KEY); } catch(e) { return null; }
}
function setToken(t) {
  try { localStorage.setItem(TOKEN_KEY, t); } catch(e) {}
}
function clearToken() {
  try { localStorage.removeItem(TOKEN_KEY); } catch(e) {}
}

function apiFetch(path, options) {
  options = options || {};
  var token = getToken();
  var headers = Object.assign(
    { 'Content-Type': 'application/json' },
    token ? { 'Authorization': 'Bearer ' + token } : {},
    options.headers || {}
  );
  var body = options.body;
  if (body && typeof body !== 'string') body = JSON.stringify(body);
  return fetch(API_BASE + path, Object.assign({}, options, {
    credentials: 'include',
    headers: headers,
    body: body,
  })).then(function(res) {
    var ct = res.headers.get('content-type') || '';
    return (ct.includes('application/json') ? res.json() : res.text().then(function(t) {
      return { error: 'Reponse non-JSON (' + res.status + ') : ' + t.slice(0, 200) };
    })).then(function(data) {
      if (!res.ok) throw new Error(data.error || ('Erreur HTTP ' + res.status));
      return data;
    });
  });
}

function scoreColor(pct) {
  if (pct >= 75) return '#16A34A';
  if (pct >= 50) return '#D97706';
  return '#C84B4B';
}

function readFileAsText(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result); };
    reader.onerror = function() { reject(new Error('Erreur lecture ' + file.name)); };
    // Pour les fichiers binaires (Excel, Word), on lit en ArrayBuffer puis on extrait le texte brut
    if (file.name.match(/\.(xlsx|xls)$/i) || file.name.match(/\.(docx|doc)$/i)) {
      reader.readAsBinaryString(file);
    } else {
      reader.readAsText(file, 'UTF-8');
    }
  });
}

// Extraction texte basique depuis binaire Office (heuristique, suffisant pour Claude)
function extractTextFromBinary(content, filename) {
  // Tente d'extraire les sequences de caracteres lisibles
  var readable = content.replace(/[^\x20-\x7E\xA0-\xFF\n\r\t]/g, ' ');
  // Supprime les sequences de plus de 3 espaces
  readable = readable.replace(/  +/g, ' ');
  // Supprime les lignes vides multiples
  readable = readable.replace(/(\n\s*){3,}/g, '\n\n');
  // Extraction des chaines de 4+ caracteres lisibles
  var matches = content.match(/[\x20-\x7E\xC0-\xFF]{4,}/g) || [];
  var textChunks = matches.filter(function(s) {
    return s.trim().length > 3 && !/^[^a-zA-ZÀ-ÿ]*$/.test(s);
  });
  return '[Extraction automatique depuis ' + filename + ']\n' + textChunks.join('\n');
}

/* ══ EXPORT MARKDOWN ════════════════════════════════════════════ */
function genererMarkdown(analyse) {
  if (!analyse) return '';
  var meta = analyse.meta || {};
  var lines = [];

  lines.push('# Analyse Plan de Formation — ' + (meta.titre_formation || 'Formation'));
  lines.push('');
  lines.push('**Référence RNCP :** ' + (meta.rncp_ref || '—'));
  lines.push('**Date d\'analyse :** ' + (meta.date_analyse || '—'));
  lines.push('**Score global :** ' + (meta.score_global || 0) + '/100');
  lines.push('');
  lines.push('**Documents analysés :** ' + (meta.documents_analyses || []).join(', '));
  lines.push('');
  lines.push('---');
  lines.push('');
  lines.push('## Synthèse');
  lines.push('');
  lines.push('| Indicateur | Nombre |');
  lines.push('|---|---|');
  lines.push('| ✅ Points forts | ' + (meta.nb_points_forts || 0) + ' |');
  lines.push('| 🔵 À peaufiner | ' + (meta.nb_a_peaufiner || 0) + ' |');
  lines.push('| 🟡 Redondances | ' + (meta.nb_redondances || 0) + ' |');
  lines.push('| 🟠 Lacunes | ' + (meta.nb_lacunes || 0) + ' |');
  lines.push('| 🔴 Manquements | ' + (meta.nb_manquements || 0) + ' |');
  lines.push('');
  lines.push('---');
  lines.push('');

  (analyse.blocs || []).forEach(function(bloc) {
    lines.push('## ' + bloc.id + ' — ' + bloc.titre);
    lines.push('');
    lines.push('**Couverture :** ' + (bloc.score_couverture || 0) + '%');
    lines.push('');

    (bloc.competences || []).forEach(function(comp) {
      lines.push('### ' + comp.id + ' — ' + comp.libelle);
      lines.push('');
      lines.push('**Statut :** ' + (STATUT_LABELS[comp.statut] || comp.statut));
      lines.push('**Couverture :** ' + (comp.score_couverture || 0) + '%');
      if (comp.modules_couvrants && comp.modules_couvrants.length > 0) {
        lines.push('**Modules couvrants :** ' + comp.modules_couvrants.join(', '));
      }
      lines.push('');

      (comp.signaux || []).forEach(function(signal) {
        var statut = signal.statut_arbitrage || 'actif';
        var prefix = statut === 'archive' ? '~~' : '';
        var suffix = statut === 'archive' ? '~~' : '';
        lines.push('#### Signal ' + signal.id + ' — ' + (STATUT_LABELS[signal.type] || signal.type));
        lines.push('');
        lines.push('- **Gravité :** ' + (GRAVITE_LABELS[signal.gravite] || signal.gravite));
        lines.push('- **Statut :** ' + (statut === 'archive' ? 'Archivé' : statut === 'resolu' ? 'Résolu' : 'Actif'));
        lines.push('- **Message :** ' + prefix + signal.message + suffix);
        if (signal.amelioration_proposee) {
          lines.push('- **Amélioration retenue :** ' + signal.amelioration_proposee);
        }
        if (signal.justification_archive) {
          lines.push('- **Justification archivage :** ' + signal.justification_archive);
        }
        lines.push('');
      });
    });
  });

  lines.push('---');
  lines.push('');
  lines.push('## Signaux actifs (à traiter)');
  lines.push('');

  var actifs = [];
  (analyse.blocs || []).forEach(function(bloc) {
    (bloc.competences || []).forEach(function(comp) {
      (comp.signaux || []).forEach(function(s) {
        if (s.statut_arbitrage === 'actif' && s.type !== 'point_fort') {
          actifs.push({ blocId: bloc.id, compId: comp.id, signal: s });
        }
      });
    });
  });

  if (actifs.length === 0) {
    lines.push('_Aucun signal actif restant — tous les axes ont été arbitrés._');
  } else {
    actifs.sort(function(a, b) { return (b.signal.gravite || 0) - (a.signal.gravite || 0); });
    actifs.forEach(function(item) {
      var s = item.signal;
      lines.push('- **[' + item.blocId + ' / ' + item.compId + ']** ' + s.message);
      if (s.amelioration_proposee) {
        lines.push('  - Amélioration : ' + s.amelioration_proposee);
      }
    });
  }

  lines.push('');
  lines.push('---');
  lines.push('');
  lines.push('*Généré par Atlas des compétences — Éminéo*');

  return lines.join('\n');
}

/* ══ COMPOSANT : Dialogue Claude ════════════════════════════════ */
function DialogueClaude(props) {
  var signal = props.signal;
  var onAmelioration = props.onAmelioration;
  var contextComp = props.contextComp;
  var contextBloc = props.contextBloc;

  var initialMsg = {
    role: 'atlas',
    text: 'Signal "' + signal.message + '" — ' + (GRAVITE_LABELS[signal.gravite] || '') + '. Comment puis-je vous aider à traiter cet axe ?',
  };

  var _state = useState([initialMsg]);
  var messages = _state[0];
  var setMessages = _state[1];

  var _inp = useState('');
  var input = _inp[0];
  var setInput = _inp[1];

  var _loading = useState(false);
  var loading = _loading[0];
  var setLoading = _loading[1];

  var logRef = useRef(null);

  useEffect(function() {
    if (logRef.current) {
      logRef.current.scrollTop = logRef.current.scrollHeight;
    }
  }, [messages]);

  function envoyer() {
    if (!input.trim() || loading) return;
    var userMsg = { role: 'vous', text: input.trim() };
    var history = messages.concat([userMsg]);
    setMessages(history);
    setInput('');
    setLoading(true);

    var systemPrompt =
      'Tu es expert en ingenierie pedagogique. Tu analyses un signal identifie dans un plan de formation.\n' +
      'Bloc : ' + contextBloc + '\n' +
      'Competence : ' + contextComp + '\n' +
      'Signal : ' + signal.message + ' (type : ' + signal.type + ', gravite : ' + signal.gravite + ')\n' +
      'Reponds de facon concise et actionnable. Si l utilisateur demande une amelioration, formule-la en 1-2 phrases claires et operationnelles.';

  var setStep = _step[1];

  var FILE_TYPES = [

    { key: 'pf', icon: '📊', title: 'Plan de formation', hint: 'Grille des modules et volumes · Excel (.xlsx)', accept: '.xlsx,.xls' },
    { key: 'syllabi', icon: '📄', title: 'Syllabi (optionnel)', hint: 'Document Word regroupant tous les syllabi · .docx', accept: '.docx,.doc' },
    { key: 'grilles', icon: '📝', title: 'Grilles d\'évaluation (optionnel)', hint: 'Grilles EC certification · Excel (.xlsx)', accept: '.xlsx,.xls' },
  ];

  function handleFile(key, e) {
    var f = e.target.files && e.target.files[0];
    if (!f) return;
    setFiles(function(prev) {
      var next = Object.assign({}, prev);
      next[key] = f;
      return next;
    });
  }

  var canAnalyse = files.race && files.pf && titre.trim();

  async function lancer() {
    if (!canAnalyse) return;
    setLoading(true);
    setError('');
    setStep('Lecture des documents…');

    try {
      var documents = [];

      for (var i = 0; i < FILE_TYPES.length; i++) {
        var ft = FILE_TYPES[i];
        var file = files[ft.key];
        if (!file) continue;
        setStep('Lecture : ' + file.name + '…');
        try {
          var texte = await readFileAsText(file);
          // Pour les fichiers binaires, on fait une extraction basique
          if (file.name.match(/\.(xlsx|xls|docx|doc)$/i)) {
            texte = extractTextFromBinary(texte, file.name);
          }
          if (texte && texte.trim().length > 50) {
            documents.push({ type: ft.key, nom: file.name, texte: texte });
          }
        } catch(readErr) {
          console.warn('Lecture partielle', file.name, readErr);
        }
      }

      if (documents.length === 0) {
        throw new Error('Aucun texte exploitable extrait des fichiers.');
      }

      setStep('Analyse par Claude…');

      var result = await apiFetch('/api/analyse-pf', {
        method: 'POST',
        body: {
          documents: documents,
          titre_formation: titre.trim(),
          rncp_ref: rncp.trim(),
        },

      if (!result.analyse) throw new Error('Réponse serveur inattendue.');
      onAnalyse(result.analyse);

      setStep('');

        React.createElement('button', {
          onClick: onLogout,
          style: { fontSize: 12, color: 'rgba(255,255,255,.4)', border: '1px solid rgba(255,255,255,.12)', borderRadius: 6, padding: '3px 10px' },

            type: 'text',

            type: 'text',
            className: 'field-input-light',
            placeholder: 'Ex : RNCP 38504',
            value: rncp,

          })

          var f = files[ft.key];

        loading ?
          React.createElement(React.Fragment, null,
            React.createElement('div', { className: 'spinner' }),
            step || 'Analyse en cours…'
          ) :
          '→ Lancer l\'analyse'
      ),

      !canAnalyse && !loading ? React.createElement('p', {
        style: { fontSize: 12, color: '#8A8982', marginTop: '.6rem' },
      }, 'Requis : RACE (PDF) + Plan de formation (Excel) + Titre de la formation.') : null
    )
  );
}

/* ══ COMPOSANT : Login ══════════════════════════════════════════ */
function Login(props) {
  var onLogin = props.onLogin;

  var _email = useState('');
  var email = _email[0];
  var setEmail = _email[1];

  var _pwd = useState('');
  var pwd = _pwd[0];
  var setPwd = _pwd[1];

  var _loading = useState(false);
  var loading = _loading[0];
  var setLoading = _loading[1];

  var _error = useState('');
  var error = _error[0];
  var setError = _error[1];

  function handleSubmit(e) {
    e.preventDefault();
    if (!email.trim() || !pwd.trim() || loading) return;
    setLoading(true);
    setError('');
    apiFetch('/api/auth/login', {
      method: 'POST',
      body: { email: email.trim(), password: pwd },
    }).then(function(data) {
      if (data.token) {
        setToken(data.token);
        onLogin(data.user);
      } else {
        setError('Réponse inattendue du serveur.');
        setLoading(false);
      }
    }).catch(function(err) {
      setError(err.message || 'Identifiants incorrects.');
      setLoading(false);
    });
  }

  return React.createElement('div', { className: 'login-wrap' },
    React.createElement('div', { className: 'login-card' },
      React.createElement('div', { style: { textAlign: 'center', marginBottom: '2rem' } },
        React.createElement('div', {
          style: { fontSize: 10, color: 'rgba(255,255,255,.3)', letterSpacing: '.1em', textTransform: 'uppercase', marginBottom: '1rem' },
        }, 'MSMC — RNCP 38504'),
        React.createElement('h1', {
          style: { fontFamily: 'Playfair Display,serif', color: '#fff', fontSize: 22, fontWeight: 400, margin: 0 },
        }, 'Atlas des compétences'),
        React.createElement('p', {
          style: { color: 'rgba(255,255,255,.3)', fontSize: 12, marginTop: '.4rem' },
        }, 'Analyse Plan de Formation — Direction des programmes')
      ),
      React.createElement('form', { onSubmit: handleSubmit },
        React.createElement('label', { className: 'field-label' }, 'Email'),
        React.createElement('input', {
          type: 'email', className: 'field-input',
          value: email, onChange: function(e) { setEmail(e.target.value); },
          placeholder: 'prenom.nom@emineo-education.fr', autoFocus: true,
        }),
        React.createElement('label', { className: 'field-label' }, 'Mot de passe'),
        React.createElement('input', {
          type: 'password', className: 'field-input',
          value: pwd, onChange: function(e) { setPwd(e.target.value); },
          placeholder: '••••••••',
        }),
        error ? React.createElement('div', {
          style: { fontSize: 12, color: '#FCA5A5', marginBottom: '.75rem', background: 'rgba(252,165,165,.1)', padding: '6px 10px', borderRadius: 6 },
        }, error) : null,
        React.createElement('button', {
          type: 'submit', className: 'btn-primary',
          disabled: !email.trim() || !pwd.trim() || loading,
        }, loading ? 'Connexion…' : 'Accéder à l\'outil')
      )
    )
  );
}

/* ══ ROOT ═══════════════════════════════════════════════════════ */
function App() {
  var _user = useState(null);
  var user = _user[0];
  var setUser = _user[1];

  var _analyse = useState(null);
  var analyse = _analyse[0];
  var setAnalyse = _analyse[1];

  var _checking = useState(true);
  var checking = _checking[0];
  var setChecking = _checking[1];

  useEffect(function() {
    var token = getToken();
    if (!token) { setChecking(false); return; }
    apiFetch('/api/auth/me').then(function(data) {
      if (data.user && data.user.role === 'dir') {
        setUser(data.user);
      } else {
        clearToken();
      }
      setChecking(false);
    }).catch(function() {
      clearToken();
      setChecking(false);
    });
  }, []);

  if (checking) {
    return React.createElement('div', {
      style: {
        minHeight: '100vh', background: '#0B2B2D',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      },
    },
      React.createElement('div', {
        style: { width: 24, height: 24, border: '2px solid rgba(255,255,255,.2)', borderTopColor: '#5DE298', borderRadius: '50%', animation: 'spin .7s linear infinite' },
      })
    );
  }

  if (!user) {
    return React.createElement(Login, { onLogin: setUser });
  }

  if (analyse) {
    return React.createElement(VueAnalyse, {
      analyse: analyse,
      onReset: function() { setAnalyse(null); },
    });
  }

  return React.createElement(VueUpload, {
    onAnalyse: setAnalyse,
    userName: (user.prenom || '') + ' ' + (user.nom || ''),
    onLogout: function() {
      apiFetch('/api/auth/logout', { method: 'POST' }).catch(function() {});
      clearToken();
      setUser(null);
    },
  });
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
</body>
